# 核心平台正式环境配置。
# 正式环境只允许通过环境变量、配置中心或密钥管理系统注入真实值。

# HTTP 服务配置。
server:
  # 核心平台正式环境监听端口。
  port: ${ZHYC_PLATFORM_PORT:8081}

# Spring Boot 正式环境基础设施配置。
spring:
  # Spring Cache 实现类型。
  cache:
    type: ${ZHYC_CACHE_TYPE:redis}
  # Redis 连接配置。
  data:
    redis:
      # Redis 主机。
      host: ${ZHYC_REDIS_HOST}
      # Redis 端口。
      port: ${ZHYC_REDIS_PORT:6379}
      # Redis 密码；正式环境不得留空。
      password: ${ZHYC_REDIS_PASSWORD}
      # Redis 数据库序号。
      database: ${ZHYC_REDIS_DATABASE:0}
      # Redis 连接超时时间。
      timeout: ${ZHYC_REDIS_TIMEOUT:2s}
  # 核心平台正式数据源配置。
  datasource:
    # 主库 URL。
    url: ${ZHYC_PLATFORM_DATASOURCE_URL}
    # 主库用户名。
    username: ${ZHYC_PLATFORM_DATASOURCE_USERNAME}
    # 主库密码。
    password: ${ZHYC_PLATFORM_DATASOURCE_PASSWORD}

# ZHYC 核心平台正式环境配置。
zhyc:
  # 平台缓存配置。
  cache:
    # 是否启用平台缓存。
    enabled: ${ZHYC_CACHE_ENABLED:true}
    # 缓存 Key 前缀。
    prefix: ${ZHYC_CACHE_PREFIX:zhyc}
    # 默认缓存过期时间。
    default-ttl: ${ZHYC_CACHE_DEFAULT_TTL:PT10M}
  # 核心平台模块配置。
  platform:
    # 认证中心对接配置。
    auth:
      # JWK Set 地址。
      jwk-set-uri: ${ZHYC_PLATFORM_AUTH_JWK_SET_URI}
      # JWT issuer。
      issuer: ${ZHYC_PLATFORM_AUTH_ISSUER}
      # Token 端点地址。
      token-uri: ${ZHYC_PLATFORM_AUTH_TOKEN_URI}
      # OAuth2 客户端 ID。
      client-id: ${ZHYC_PLATFORM_AUTH_CLIENT_ID}
      # OAuth2 客户端密钥。
      client-secret: ${ZHYC_PLATFORM_AUTH_CLIENT_SECRET}
