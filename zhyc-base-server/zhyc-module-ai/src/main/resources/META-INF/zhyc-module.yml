# 模块唯一编码；用于模块注册、依赖声明和权限前缀归属。
moduleCode: ai
# 模块中文名称；用于后台菜单和模块管理展示。
moduleName: AI 能力中心
# 模块版本号；用于模块能力演进和兼容性识别。
version: 1.0.0
# 模块类型；core 表示平台核心能力模块。
moduleType: core
# 租户模式；tenant_id 表示 AI 配置、应用、审计和配额按租户隔离。
tenantMode: tenant_id
# 权限编码前缀；AI 能力权限统一使用 ai 前缀。
permissionPrefix: ai
# 后端基础包名；模块扫描和规范校验使用。
backendPackage: com.zhyc.ai
# 是否依赖开放 API 网关运行。
openApiGatewayRequired: false
# 是否依赖认证中心运行。
authServerRequired: true
# 是否默认启用模块。
enabled: true
# 当前模块依赖的基础模块编码。
dependencies:
  - common
  - system
  - file
# 当前模块贡献的菜单编码。
menus:
  - ai:dashboard
  - ai:provider
  - ai:model
  - ai:app
  - ai:prompt
  - ai:audit
  - ai:quota
  - ai:safety
# 当前模块声明的 Shiro 权限编码；必须与接口注解和菜单按钮保持一致。
permissions:
  - ai:dashboard:view
  - ai:provider:query
  - ai:provider:save
  - ai:provider:test
  - ai:model:query
  - ai:model:save
  - ai:app:query
  - ai:app:save
  - ai:runtime:chat
  - ai:prompt:query
  - ai:prompt:save
  - ai:audit:query
  - ai:audit:record
  - ai:quota:query
  - ai:quota:save
  - ai:safety:query
  - ai:safety:save
# 当前模块需要加载的数据库初始化脚本。
databaseScripts:
  - classpath:db/V1__ai_core.sql
