# 模块唯一编码；用于模块注册、依赖声明和权限前缀归属。
moduleCode: message
# 模块中文名称；用于后台菜单和模块管理展示。
moduleName: 消息中心
# 模块版本号；用于模块能力演进和兼容性识别。
version: 1.0.0
# 模块类型；extension 表示平台扩展能力模块。
moduleType: extension
# 租户模式；tenant_id 表示消息模板和站内信按租户隔离。
tenantMode: tenant_id
# 权限编码前缀；消息权限统一使用 message 前缀。
permissionPrefix: message
# 后端基础包名；模块扫描和规范校验使用。
backendPackage: com.zhyc.message
# 是否依赖开放 API 网关运行。
openApiGatewayRequired: false
# 是否依赖认证中心运行。
authServerRequired: true
# 是否默认启用模块。
enabled: true
# 当前模块依赖的基础模块编码。
dependencies:
  - common
  - system
# 当前模块贡献的菜单编码。
menus:
  - message:template
  - message:inbox
# 当前模块声明的 Shiro 权限编码；必须与接口注解和菜单按钮保持一致。
permissions:
  - message:inbox:query
  - message:inbox:read
  - message:inbox:send
  - message:template:query
  - message:template:save
  - message:template:view
  - message:inbox:view
# 当前模块需要加载的数据库初始化脚本。
databaseScripts:
  - classpath:db/V1__message_core.sql
