# 模块唯一编码；用于模块注册、依赖声明和权限前缀归属。
moduleCode: system
# 模块中文名称；用于后台菜单和模块管理展示。
moduleName: 系统管理
# 模块版本号；用于模块能力演进和兼容性识别。
version: 1.0.0
# 模块类型；core 表示平台核心模块。
moduleType: core
# 租户模式；tenant_id 表示业务表和查询必须通过 tenant_id 隔离。
tenantMode: tenant_id
# 权限编码前缀；系统管理权限统一使用 system 前缀。
permissionPrefix: system
# 后端基础包名；模块扫描和规范校验使用。
backendPackage: com.zhyc.system
# 是否依赖开放 API 网关运行。
openApiGatewayRequired: false
# 是否依赖认证中心运行。
authServerRequired: true
# 是否默认启用模块。
enabled: true
# 当前模块依赖的基础模块编码。
dependencies:
  - common
# 当前模块贡献的菜单编码。
menus:
  - system:tenant
  - system:user
  - system:role
  - system:module
  - system:security-protection
# 当前模块声明的 Shiro 权限编码；必须与接口注解和菜单按钮保持一致。
