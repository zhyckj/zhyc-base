# 模块唯一编码；用于模块注册、依赖声明和权限前缀归属。
moduleCode: visual
# 模块中文名称；用于后台菜单和模块管理展示。
moduleName: 报表大屏
# 模块版本号；用于模块能力演进和兼容性识别。
version: 1.0.0
# 模块类型；reserved 表示预留扩展模块。
moduleType: reserved
# 租户模式；tenant_id 表示数据集、报表和大屏按租户隔离。
tenantMode: tenant_id
# 权限编码前缀；报表大屏权限统一使用 visual 前缀。
permissionPrefix: visual
# 后端基础包名；模块扫描和规范校验使用。
backendPackage: com.zhyc.visual
# 是否依赖开放 API 网关运行。
openApiGatewayRequired: false
# 是否依赖认证中心运行。
authServerRequired: true
# 是否默认启用模块。
enabled: true
# 当前模块依赖的基础模块编码。
dependencies:
  - common
  - system
# 当前模块贡献的菜单编码。
menus:
  - visual:dashboard
# 当前模块声明的 Shiro 权限编码；必须与接口注解和菜单按钮保持一致。
permissions:
  - visual:dataset:query
  - visual:dataset:save
  - visual:dashboard:view
  - visual:report:query
  - visual:report:publish
  - visual:report:save
  - visual:screen:publish
  - visual:screen:query
  - visual:screen:save
# 当前模块需要加载的数据库初始化脚本。
databaseScripts:
  - classpath:db/V1__visual_core.sql
