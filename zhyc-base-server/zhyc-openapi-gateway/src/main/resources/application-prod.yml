# 开放 API 网关正式环境配置。
# 正式环境只允许通过环境变量、配置中心或密钥管理系统注入真实值。

# HTTP 服务配置。
server:
  # 开放 API 网关正式环境监听端口。
  port: ${ZHYC_OPENAPI_PORT:8070}

# Spring Boot 正式环境基础设施配置。
spring:
  # Redis 连接配置；用于限流、nonce 防重放和缓存。
  data:
    redis:
      # Redis 主机。
      host: ${ZHYC_REDIS_HOST}
      # Redis 端口。
      port: ${ZHYC_REDIS_PORT:6379}
      # Redis 密码；正式环境不得留空。
      password: ${ZHYC_REDIS_PASSWORD}
      # Redis 数据库序号。
      database: ${ZHYC_REDIS_DATABASE:0}
      # Redis 连接超时时间。
      timeout: ${ZHYC_REDIS_TIMEOUT:2s}
  # 开放 API 网关正式数据源配置。
  datasource:
    # 网关业务数据源 URL。
    url: ${SPRING_DATASOURCE_URL}
    # 数据源用户名。
    username: ${SPRING_DATASOURCE_USERNAME}
    # 数据源密码。
    password: ${SPRING_DATASOURCE_PASSWORD}

# ZHYC 开放 API 网关正式环境配置。
zhyc:
  # 缓存和 Redis 能力开关。
  cache:
    # 是否启用网关缓存能力。
    enabled: ${ZHYC_CACHE_ENABLED:true}
    # 缓存 Key 前缀。
    prefix: ${ZHYC_CACHE_PREFIX:zhyc}
    # Redis 组件开关。
    redis:
      enabled: ${ZHYC_REDIS_ENABLED:true}
  # 开放 API 网关业务配置。
  openapi:
    # OAuth2 Token introspection 配置。
    oauth2:
      # 认证中心 introspection 端点地址。
      introspection-uri: ${ZHYC_OPENAPI_OAUTH2_INTROSPECTION_URI}
      # 网关调用 introspection 端点使用的客户端 ID。
      client-id: ${ZHYC_OPENAPI_OAUTH2_CLIENT_ID}
      # 网关调用 introspection 端点使用的客户端密钥。
      client-secret: ${ZHYC_OPENAPI_OAUTH2_CLIENT_SECRET}
